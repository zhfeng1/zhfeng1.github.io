name = "docker-registry-proxy-worker"
main = "src/index.js"
compatibility_date = "2026-07-08"

# Required for the /admin TOTP flow used by the Worker.
# Set it before deploy:
#   npx wrangler secret put TOTP_SECRET

# The Worker reads AUTH_KV first and falls back to WHITELIST_KV.
# Create a KV namespace, then replace the placeholder IDs below:
#   npx wrangler kv namespace create AUTH_KV
#   npx wrangler kv namespace create AUTH_KV --preview
[[kv_namespaces]]
binding = "AUTH_KV"
id = "REPLACE_WITH_AUTH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_AUTH_KV_PREVIEW_NAMESPACE_ID"
